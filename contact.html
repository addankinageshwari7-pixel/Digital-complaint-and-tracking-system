{% extends 'base.html' %}
{% block title %}Contact · DCMS{% endblock %}
{% block content %}
<div class="container section">
  <div class="row justify-content-center"><div class="col-lg-7">
    <div class="card glass">
      <div class="card-header">Contact Us</div>
      <div class="card-body">
        <form method="post" class="needs-validation" novalidate>
          <div class="row g-3">
            <div class="col-md-6"><label class="form-label">Name</label>
              <input name="name" class="form-control" required maxlength="120"></div>
            <div class="col-md-6"><label class="form-label">Email</label>
              <input name="email" type="email" class="form-control" required maxlength="120"></div>
            <div class="col-12"><label class="form-label">Subject</label>
              <input name="subject" class="form-control" required maxlength="200"></div>
            <div class="col-12"><label class="form-label">Message</label>
              <textarea name="message" class="form-control" rows="5" required maxlength="1500"></textarea></div>
          </div>
          <button class="btn btn-primary mt-3">Send Message</button>
        </form>
      </div>
    </div>
  </div></div>
</div>
{% endblock %}
