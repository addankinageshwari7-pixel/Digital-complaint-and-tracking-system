{% extends 'base.html' %}
{% block title %}Admin Login · DCMS{% endblock %}
{% block content %}
<div class="container section">
<div class="row justify-content-center"><div class="col-md-5">
  <div class="card glass">
    <div class="card-header">Admin Login</div>
    <div class="card-body">
      <form method="post">
        <div class="mb-3"><label class="form-label">Email</label>
          <input name="email" type="email" class="form-control" required></div>
        <div class="mb-3"><label class="form-label">Password</label>
          <input name="password" type="password" class="form-control" required></div>
        <button class="btn btn-primary w-100">Sign In</button>
      </form>
      <p class="text-muted mt-3 mb-0 small">Demo: admin@dcms.gov / admin123</p>
    </div>
  </div>
</div></div>
</div>
{% endblock %}
